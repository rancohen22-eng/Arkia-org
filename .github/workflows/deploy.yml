name: Deploy org-chart system

# Any push to main deploys the code to the Oracle server (same box as the pricing
# system) and restarts the arkia-org service. Manual run also allowed.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-arkia-org
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Trust server host key
        run: ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to server (never touches DB / secrets / venv)
        run: |
          rsync -az \
            --exclude '.git' --exclude '.github' \
            --exclude 'data' --exclude 'backups' \
            --exclude 'users.txt' --exclude '.env' --exclude '*.env' \
            --exclude '__pycache__' --exclude '*.pyc' --exclude '.venv' \
            ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/arkia-org/"

      - name: Install deps and restart
        run: |
          ssh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            'export PATH=$HOME/.local/bin:$PATH && cd /opt/arkia-org && VIRTUAL_ENV=/opt/arkia-org/.venv uv pip install -q -r requirements.txt && sudo systemctl restart arkia-org && sleep 2 && systemctl is-active arkia-org && curl -sS http://127.0.0.1:8020/health'
